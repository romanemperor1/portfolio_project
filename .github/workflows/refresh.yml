name: Refresh portfolio prices

on:
  schedule:
    - cron: "0 21 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-prices
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run refresh
        run: python scripts/refresh.py

      - name: Commit & push if state changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/portfolio_state.json
          if git diff --staged --quiet; then
            echo "No state change — nothing to commit."
          else
            git commit -m "[skip ci] Refresh prices $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
